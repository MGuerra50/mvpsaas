# Perfil Docker — mesmas configurações de datasource/JPA do ambiente local
server.tomcat.max-http-form-post-size=10MB

spring.datasource.url=jdbc:h2:mem:orcazap
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

app.jwt.secret=orcazap-dev-secret-key-minimum-32-chars!!
app.jwt.tenant-id-claim=tenant_id
app.jwt.user-id-claim=user_id
app.jwt.email-claim=email
app.jwt.token-type-claim=token_type
app.jwt.access-token-type=access
app.jwt.refresh-token-type=refresh
app.jwt.access-token-expiration=15m
app.jwt.refresh-token-expiration=7d
app.jwt.refresh-token-cookie-name=refresh_token
