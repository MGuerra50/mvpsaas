spring.application.name=b2b

# H2 — banco em memória (desenvolvimento local)
spring.datasource.url=jdbc:h2:mem:orcazap
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Seed SQL após criação das tabelas pelo Hibernate
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT
app.jwt.secret=orcazap-dev-secret-key-minimum-32-chars!!
app.jwt.tenant-id-claim=tenant_id
app.jwt.user-id-claim=user_id
app.jwt.email-claim=email
app.jwt.token-type-claim=token_type
app.jwt.access-token-type=access
app.jwt.refresh-token-type=refresh
app.jwt.access-token-expiration=15m
app.jwt.refresh-token-expiration=7d
app.jwt.refresh-token-cookie-name=refresh_token

# BCrypt de "password" — referenciado em data.sql via placeholder
app.seed.bcrypt-password=\$2a\$10\$dXJ3SW6G7P50lGmMkkmwe.20cQQubK3.HZWzG1LBIOiPuTYKfv1O
